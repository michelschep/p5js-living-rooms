<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Rooms — Cellular Life</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Courier New', monospace;
      color: #ccc;
      padding: 8px;
      min-height: 100vh;
    }

    h1 {
      font-size: clamp(12px, 3vw, 17px);
      letter-spacing: 3px;
      color: #7ec8a0;
      margin-bottom: 8px;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Main row: panels LEFT + canvas RIGHT ── */
    #simulation-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      width: 100%;
      max-width: 1140px;
    }

    #panels-column {
      display: flex;
      flex-direction: column;
      width: 190px;
      flex-shrink: 0;
      gap: 1px;          /* 1px gap matches floor divider line in canvas */
    }

    #canvas-container canvas {
      display: block;
    }

    /* ── Floor panels ── */
    .floor-panel {
      background: #111;
      border: 1px solid #1e2e1e;
      border-radius: 4px;
      padding: 6px 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 3px;
      /* height is set via JS to match floorH */
    }

    .floor-panel h3 {
      color: #7ec8a0;
      font-size: clamp(10px, 2.5vw, 12px);
      border-bottom: 1px solid #1e2e1e;
      padding-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sensor-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .sensor-val {
      color: #bbb;
      font-size: clamp(9px, 2.2vw, 11px);
      white-space: nowrap;
    }

    .count-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }

    .count-item {
      font-size: clamp(9px, 2.2vw, 11px);
    }

    /* ── Status + legend ── */
    #status-bar {
      margin-top: 6px;
      font-size: clamp(9px, 2vw, 11px);
      color: #555;
      text-align: center;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #countdown-text {
      color: #7ec8a0;
      font-weight: bold;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
      font-size: clamp(9px, 2vw, 11px);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Mobile: stack vertically ── */
    @media (max-width: 560px) {
      #simulation-row {
        flex-direction: column;
        align-items: stretch;
      }
      #panels-column {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 4px;
      }
      .floor-panel {
        flex: 1;
        min-width: 110px;
        height: auto !important;
      }
    }
  </style>
</head>
<body>
  <h1>🏠 Living Rooms — Cellular Life</h1>

  <div id="simulation-row">
    <div id="panels-column">

      <div class="floor-panel" id="panel-floor3">
        <h3>Tweede verdieping</h3>
        <div class="sensor-row" id="sensors-floor3"><span class="sensor-val">—</span></div>
        <div class="count-row"  id="counts-floor3">—</div>
      </div>

      <div class="floor-panel" id="panel-floor2">
        <h3>Eerste verdieping</h3>
        <div class="sensor-row" id="sensors-floor2"><span class="sensor-val">—</span></div>
        <div class="count-row"  id="counts-floor2">—</div>
      </div>

      <div class="floor-panel" id="panel-floor1">
        <h3>Begane grond</h3>
        <div class="sensor-row" id="sensors-floor1"><span class="sensor-val">—</span></div>
        <div class="count-row"  id="counts-floor1">—</div>
      </div>

    </div>
    <div id="canvas-container"></div>
  </div>

  <div id="status-bar">
    <span id="status-text">Laden van kamerdata…</span>
    <span id="countdown-text"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4daf5e"></div> Plant</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5ab4d4"></div> Herbivoor</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d45a5a"></div> Predator</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9b7fc9"></div> Decomposer</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c8904a"></div> Schimmel</div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
